name: image_editor
description: A beautiful iOS-style image editor for Flutter with crop, rotate, and color adjustment features.
version: 0.1.0
homepage: https://github.com/image_editor

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0
  image: ^4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
